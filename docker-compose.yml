### docker-compose.yml

services:
  camera:
    image: picarx-ros:rolling
    network_mode: host
    ipc: host
    privileged: true
    working_dir: /ws
    volumes:
      - ./ws:/ws
      - ~/robot-hat:/robot-hat:ro
      - ~/picar-x:/picar-x:ro
      - /run/udev:/run/udev
      - /dev/dri:/dev/dri
    environment:
      - ROS_DOMAIN_ID=0
      - PYTHONPATH=/usr/local/lib/aarch64-linux-gnu/python3.12/site-packages:/build/kmsxx/build/py:/robot-hat:/picar-x
    command: >
      bash -c "source /opt/ros/rolling/setup.bash &&
               cd /ws &&
               colcon build --packages-select picarx_camera &&
               source install/setup.bash &&
               ros2 run picarx_camera camera_node"

  motor:
    image: picarx-motor:rolling
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    working_dir: /ws
    devices:
      - /dev/gpiochip0:/dev/gpiochip0    # RPi5 GPIO (pinctrl-rp1, 54 lines)
      # - /dev/gpiomem4:/dev/gpiomem4      # RPi5 GPIO memory-mapped access
      - /dev/i2c-1:/dev/i2c-1            # Robot HAT confirmed at 0x14
    volumes:
      - ./ws:/ws
      - ~/robot-hat:/robot-hat:ro
      - ~/picar-x:/picar-x:ro
    environment:
      - USER=root
      - ROS_DOMAIN_ID=0
      - PYTHONPATH=/usr/local/lib/aarch64-linux-gnu/python3.12/site-packages:/build/kmsxx/build/py:/robot-hat:/picar-x
      - GPIOZERO_PIN_FACTORY=lgpio
      - LGPIO_CHIP=0                     # gpiochip0 = the real chip on RPi5
    command: >
      bash -c "source /opt/ros/rolling/setup.bash &&
              cd /ws &&
              colcon build --packages-select picarx_motor &&
              source install/setup.bash &&
              ros2 run picarx_motor motor_controller_node"

  teleop:
    image: picarx-ros:rolling
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      bash -c "source /opt/ros/rolling/setup.bash &&
               ros2 run teleop_twist_keyboard teleop_twist_keyboard"

  recorder:
    image: picarx-ros:rolling
    network_mode: host
    ipc: host
    working_dir: /ws/bags
    volumes:
      - ./bags:/ws/bags
    environment:
      - ROS_DOMAIN_ID=0
    command: >
      bash -c "source /opt/ros/rolling/setup.bash &&
               ros2 bag record /camera/image_raw /camera/camera_info /cmd_vel"
    depends_on:
      - camera
      - motor
